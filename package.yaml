name: hask-image
version: 0.1.0.0
github: "mocatex/hask-image"

dependencies:
  - base >= 4.7 && < 5
  - monomer
  - JuicyPixels
  - vector
  - text
  - lens
  - directory

library:
  source-dirs: src

executables:
  hask-image-exe:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hask-image
